<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forensic // Primandito</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0a;
        --accent: #ff5555;
        --text: #888;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "IBM Plex Mono", monospace;
        background: var(--bg);
        color: var(--text);
        padding: 60px 20px;
        line-height: 1.6;
      }
      .container {
        max-width: 750px;
        margin: 0 auto;
      }

      header {
        margin-bottom: 50px;
      }
      h1 {
        color: #eee;
        font-size: 1.2rem;
        font-weight: 500;
        margin-bottom: 10px;
      }

      /* INI KUNCI REPUTASI LU */
      .notice {
        font-size: 0.8rem;
        color: #555;
        border-left: 2px solid #222;
        padding-left: 15px;
        margin-bottom: 30px;
      }

      .list {
        list-style: none;
        border-top: 1px solid #111;
      }
      .list-item {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 15px 0;
        border-bottom: 1px solid #111;
      }

      .entry-link {
        color: #ccc;
        text-decoration: none;
        font-size: 0.95rem;
        transition: 0.2s;
      }
      .entry-link:hover {
        color: var(--accent);
      }

      .entry-meta {
        font-size: 0.75rem;
        color: #444;
        font-variant-numeric: tabular-nums;
      }

      footer {
        margin-top: 80px;
      }
      .back {
        color: var(--accent);
        text-decoration: none;
        font-size: 0.8rem;
        opacity: 0.6;
      }
      .back:hover {
        opacity: 1;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Forensic</h1>
        <div class="notice">
          Raw technical notes and personal scratchpads. <br />
          Informal language, logic-focused.
        </div>
      </header>

      <div class="list">
        <div class="list-item">
          <a href="Corrupted_file/" class="entry-link">Corrupted_file</a>
          <span class="entry-meta">2026-03-31</span>
        </div>
      </div>

      <div class="list">
        <div class="list-item">
          <a href="DISKO_1/" class="entry-link">DISKO_1</a>
          <span class="entry-meta">2026-03-31</span>
        </div>
      </div>

      <div class="list">
        <div class="list-item">
          <a href="Glory_of_the_Garden/" class="entry-link"
            >Glory_of_the_Garden</a
          >
          <span class="entry-meta">2026-03-31</span>
        </div>
      </div>

      <div class="list">
        <div class="list-item">
          <a href="shark_on_wire_1/" class="entry-link">shark_on_wire_1</a>
          <span class="entry-meta">2026-03-31</span>
        </div>
      </div>

      <div class="list">
        <div class="list-item">
          <a href="So_Meta/" class="entry-link">So_Meta</a>
          <span class="entry-meta">2026-03-31</span>
        </div>
      </div>

      <footer>
        <a href="../" class="back">← cd ..</a>
      </footer>
    </div>
  </body>
</html>
