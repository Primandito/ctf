      :root {

      * {
        margin: 0;

        border-top: 1px solid #111;

      .list-item {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 15px 0;
        border-bottom: 1px solid #111;
      }

      .entry-link {
        color: #ccc;
        text-decoration: none;
        font-size: 0.95rem;
        transition: 0.2s;
      }
      .entry-link:hover {
        color: var(--accent);
      }

      .entry-meta {
        font-size: 0.75rem;
        color: #444;
        font-variant-numeric: tabular-nums;
      }

      footer {
        margin-top: 80px;
      }
      .back {
        color: var(--accent);
        text-decoration: none;
        font-size: 0.8rem;
        opacity: 0.6;
      }
      .back:hover {

      }
