<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CTF Archive // Primandito</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0a;
        --accent: #ff5555;
        --text: #888;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "IBM Plex Mono", monospace;
        background: var(--bg);
        color: var(--text);
        padding: 60px 20px;
        line-height: 1.6;
      }
      .container {
        max-width: 650px;
        margin: 0 auto;
      }

      header {
        margin-bottom: 40px;
      }
      h1 {
        color: #fff;
        font-size: 1.1rem;
        font-weight: 500;
        margin-bottom: 10px;
      }
      p {
        font-size: 0.85rem;
        color: #555;
      }

      .list {
        list-style: none;
        margin-top: 40px;
      }
      .list-item {
        margin-bottom: 15px;
      }
      .list-link {
        color: #ccc;
        text-decoration: none;
        font-size: 0.9rem;
        transition: 0.2s;
      }
      .list-link:hover {
        color: var(--accent);
      }
      .list-link::before {
        content: "> ";
        color: #333;
      }

      footer {
        margin-top: 100px;
        border-top: 1px solid #1a1a1a;
        padding-top: 20px;
      }
      .back {
        color: #444;
        text-decoration: none;
        font-size: 0.8rem;
      }
      .back:hover {
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>CTF Write-ups</h1>
        <p>
          Collection of technical solutions and mission logs across various
          categories.
        </p>
      </header>

      <nav>
        <ul class="list">
          <li class="list-item">
            <a href="web/" class="list-link">Web Exploitation</a>
          </li>
          <li class="list-item">
            <a href="binary/" class="list-link">Binary Exploitation</a>
          </li>
          <li class="list-item">
            <a href="reverse/" class="list-link">Reverse Engineering</a>
          </li>
          <li class="list-item">
            <a href="forensic/" class="list-link">Forensics</a>
          </li>
          <li class="list-item">
            <a href="misc/" class="list-link">Miscellaneous</a>
          </li>
        </ul>
      </nav>

      <footer>
        <a href="../portfolio.html" class="back">← Back to Portfolio</a>
      </footer>
    </div>
  </body>
</html>
